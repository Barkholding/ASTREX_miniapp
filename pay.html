<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата ASTREX Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { font-size: 16px; margin-bottom: 30px; opacity: 0.8; }
        #paypal-button-container {
            width: 100%;
            min-height: 200px;
        }
        .btn-confirm {
            margin-top: 20px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: none; /* Покажем после инициализации или оплаты */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ASTREX Premium 💎</h1>
        <p>Подписка на 30 дней для доступа к персональным прогнозам и эксклюзивным посланиям.</p>
        
        <div id="paypal-container-SJGLB69ZU9F8W"></div>
        <script 
            src="https://www.paypal.com/sdk/js?client-id=BAA8zwMtKFK9wowUf7dA5sJafoHhbSjiRPnkIRy-ZJ5Le44ql-PZuISXgV1OEgdp42GQlkQ9cVeLUUr3ds&components=hosted-buttons&disable-funding=venmo&currency=USD">
        </script>
        <script>
          paypal.HostedButtons({
            hostedButtonId: "SJGLB69ZU9F8W",
          }).render("#paypal-container-SJGLB69ZU9F8W")
        </script>

        <button id="mainButton" class="btn-confirm">Я оплатил</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const mainButton = document.getElementById('mainButton');
        
        // В реальном сценарии PayPal SDK предоставляет callbacks (onApprove и т.д.)
        // Но для hosted buttons они могут быть ограничены.
        // Добавим кнопку подтверждения вручную.
        
        mainButton.style.display = 'block';
        mainButton.addEventListener('click', () => {
            tg.sendData(JSON.stringify({
                action: "payment_check",
                status: "pending_confirmation"
            }));
            tg.close();
        });
    </script>
</body>
</html>
